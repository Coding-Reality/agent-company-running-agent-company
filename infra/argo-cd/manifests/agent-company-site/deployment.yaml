apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-company-site
  namespace: agent-company-site
  labels:
    app: agent-company-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-company-site
  template:
    metadata:
      labels:
        app: agent-company-site
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: web
          image: ghcr.io/coding-reality/agent-company-running-agent-company:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
