apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: agent-company-site
  namespace: agent-company-site
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`agent-company.ai`) || Host(`www.agent-company.ai`)
      kind: Rule
      services:
        - name: agent-company-site
          port: 80
  tls:
    certResolver: letsencrypt
    domains:
      - main: agent-company.ai
        sans:
          - "*.agent-company.ai"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: agent-company-site-redirect
  namespace: agent-company-site
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`agent-company.ai`) || Host(`www.agent-company.ai`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
      services:
        - name: agent-company-site
          port: 80
