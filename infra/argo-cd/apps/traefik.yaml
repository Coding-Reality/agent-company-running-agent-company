apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 37.3.0
    helm:
      values: |
        deployment:
          kind: Deployment

        providers:
          kubernetesCRD:
            enabled: true
          kubernetesIngress:
            enabled: true

        ingressClass:
          enabled: true
          isDefaultClass: true

        service:
          type: LoadBalancer

        ports:
          web:
            expose:
              default: true
          websecure:
            expose:
              default: true

        # TLS certificate automation via Let's Encrypt + Cloudflare DNS-01
        certificatesResolvers:
          letsencrypt:
            acme:
              email: admin@agent-company.ai
              storage: /data/acme.json
              caServer: "https://acme-v02.api.letsencrypt.org/directory"
              dnsChallenge:
                provider: cloudflare
                delayBeforeCheck: "10"
                resolvers:
                  - "1.1.1.1:53"
                  - "8.8.8.8:53"

        env:
          - name: CF_DNS_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-api-token
                key: api-token

        persistence:
          enabled: true
          accessMode: ReadWriteOnce
          size: 128Mi
          path: /data
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
