apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-company-site
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Coding-Reality/agent-company-running-agent-company.git
    targetRevision: main
    path: infra/argo-cd/manifests/agent-company-site
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-company-site
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
