apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-company-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Coding-Reality/agent-company-running-agent-company.git
    targetRevision: main
    path: infra/argo-cd/apps
    directory:
      recurse: true
      include: "{traefik.yaml,whoami.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
